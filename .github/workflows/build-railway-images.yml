name: Build & Push Railway Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: samiabid

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        scope: [builder, viewer]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push typebot-${{ matrix.scope }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: SCOPE=${{ matrix.scope }}
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/typebot-${{ matrix.scope }}:latest
          cache-from: type=gha,scope=${{ matrix.scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.scope }}
